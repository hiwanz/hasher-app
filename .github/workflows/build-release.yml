name: Build Release

# Triggers:
# 1. Push of git tag matching v*.*.* (e.g., v1.1.3)
# 2. Manual trigger via workflow_dispatch for rebuilds
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: darwin
            arch: x64
            script: make-mac
          - os: windows-latest
            platform: win32
            arch: x64
            script: make-win32

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Validate version
        run: |
          TAG_NAME="${{ github.ref_name }}"
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          # Extract version from tag (remove 'v' prefix)
          TAG_VERSION="${TAG_NAME#v}"

          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Error: Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)"
            exit 1
          fi
          echo "✓ Version validation passed: $PACKAGE_VERSION"

      - name: Build for macOS
        if: matrix.platform == 'darwin'
        run: npm run make-mac

      - name: Build for Windows
        if: matrix.platform == 'win32'
        run: npm run make-win32

      - name: Generate checksums (macOS)
        if: matrix.platform == 'darwin'
        run: |
          cd out/make
          find . -type f \( -name "*.zip" -o -name "*.dmg" -o -name "*.exe" \) | while read file; do
            sha256sum "$file" > "$file.sha256"
          done
          ls -la

      - name: Generate checksums (Windows)
        if: matrix.platform == 'win32'
        shell: pwsh
        run: |
          cd out/make
          Get-ChildItem -Recurse -Include "*.zip", "*.exe" | ForEach-Object {
            $hash = (Get-FileHash -Path $_.FullName -Algorithm SHA256).Hash
            "$hash  $($_.Name)" | Out-File -FilePath "$($_.Name).sha256" -Encoding UTF8
          }
          Get-ChildItem -Recurse

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}-${{ matrix.arch }}
          path: out/make/
          retention-days: 5

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Prepare release artifacts
        run: |
          mkdir -p release-files
          find all-artifacts -type f \( -name "*.zip" -o -name "*.exe" -o -name "*.sha256" \) -exec cp {} release-files/ \;
          ls -la release-files/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-files/*
          draft: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
